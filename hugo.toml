baseURL = 'https://weixi24.github.io/'
languageCode = 'zh-CN'
title = 'Weixi24'
theme = 'PaperMod'

[outputs]
home = ['HTML', 'RSS', 'JSON']

[params]
  env = 'production'
  description = '记录个人经历、学习成长和博客文章'
  defaultTheme = 'auto'  # auto / light / dark
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = false
  
  [params.homeInfoParams]
    Title = 'Hi there, I am Weixi24'
    Content = '电子工程出身，对技术和学习充满热情。这里记录我的学习、成长和一些思考。'

  [params.favicon]
    # 后续添加

[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = 'posts/'
  weight = 10

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = 'about/'
  weight = 20

[services]
  [services.rss]
    limit = 15
