baseURL = 'https://weixi24.github.io/'
languageCode = 'zh-CN'
title = 'Weixi24'
theme = 'PaperMod'

[outputs]
home = ['HTML', 'RSS', 'JSON']

[params]
  env = 'production'
  description = '记录个人经历、学习成长和博客文章'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowLastModified = true
  
  # Giscus 评论系统配置
  [params.giscus]
    repo = 'Weixi24/Weixi24.github.io'
    repoId = 'R_kgDOS5tQrw'
    category = 'Announcements'
    categoryId = ''  # 留空，Giscus 自动搜索
    mapping = 'pathname'
    theme = 'preferred_color_scheme'
    lang = 'zh-CN'

  [params.homeInfoParams]
    Title = 'Hi there, I am Weixi24'
    Content = '电子工程出身，对技术和学习充满热情。这里记录我的学习、成长和一些思考。'

[[menu.main]]
  identifier = 'timeline'
  name = '时间线'
  url = 'timeline/'
  weight = 5

[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = 'posts/'
  weight = 10

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = 'about/'
  weight = 20

[services]
  [services.rss]
    limit = 15
